<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تستر پینگ واقعی ICMP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .success-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 20px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            margin-top: 20px;
        }

        .result-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .ip-address {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .ping-value {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 20px;
        }

        .ping-excellent {
            background: #d4edda;
            color: #155724;
        }

        .ping-good {
            background: #d1ecf1;
            color: #0c5460;
        }

        .ping-fair {
            background: #fff3cd;
            color: #856404;
        }

        .ping-poor {
            background: #f8d7da;
            color: #721c24;
        }

        .ping-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .detail-label {
            font-size: 0.85em;
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .packet-info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .packet-stat {
            text-align: center;
        }

        .packet-stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .packet-stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }

        .individual-pings {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .individual-pings h4 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .ping-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ping-item {
            padding: 8px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.9em;
            border: 2px solid #e0e0e0;
        }

        .ping-item.success {
            border-color: #28a745;
            background: #d4edda;
        }

        .ping-item.failed {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #667eea;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 تستر پینگ واقعی ICMP</h1>
        <p class="subtitle">اندازه‌گیری دقیق پینگ با پروتکل ICMP واقعی</p>
        <div style="text-align: center;">
            <span class="success-badge">✓ ICMP Ping واقعی با سرور بک‌اند</span>
        </div>

        <div class="input-section">
            <input type="text" id="ipInput" placeholder="آدرس IP یا دامنه (مثال: 8.8.8.8 یا google.com)" />
            <button id="testBtn" onclick="startTest()">تست پینگ</button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        async function startTest() {
            const ipInput = document.getElementById('ipInput');
            const testBtn = document.getElementById('testBtn
